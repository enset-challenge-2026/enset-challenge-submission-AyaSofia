services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: internmatch-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: internmatch
      POSTGRES_USER: internmatch
      POSTGRES_PASSWORD: ${DB_PASSWORD:-internmatch_secret_2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U internmatch -d internmatch"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: internmatch-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://internmatch:${DB_PASSWORD:-internmatch_secret_2024}@db:5432/internmatch
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-secure-secret-min-32-chars}
      JWT_EXPIRES_IN: 7d
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      FRONTEND_URL: http://localhost
    ports:
      - "5000:5000"

  # Frontend (Nginx)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: internmatch-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
